# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "f177c5247c86efe96612a2e44549819d"
name = "vendor-register"
application_url = "https://vendor-register-pbjl.onrender.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "products/create" ]
  uri = "/webhooks/products/create"

  [[webhooks.subscriptions]]
  topics = [ "products/update" ]
  uri = "/webhooks/products/update"

  [[webhooks.subscriptions]]
  topics = [ "products/delete" ]
  uri = "/webhooks/products/delete"

  [[webhooks.subscriptions]]
  topics = [ "orders/paid" ]
  uri = "/webhooks/orders/paid"

  [[webhooks.subscriptions]]
  topics = [ "orders/cancelled" ]
  uri = "/webhooks/orders/cancelled"

  [[webhooks.subscriptions]]
  topics = [ "refunds/create" ]
  uri = "/webhooks/refunds/create"

  [[webhooks.subscriptions]]
  topics = [ "disputes/create" ]
  uri = "/webhooks/disputes/create"

  [[webhooks.subscriptions]]
  topics = [ "disputes/update" ]
  uri = "/webhooks/disputes/update"

[access_scopes]
scopes = "write_customers,read_customers,write_app_proxy,read_products,write_products,read_orders,read_draft_orders,write_draft_orders,read_shipping,write_shipping,read_inventory,write_inventory,read_locations,read_merchant_managed_fulfillment_orders,write_merchant_managed_fulfillment_orders,read_shopify_payments_disputes,read_publications,write_publications"

[product.metafields.app.marketplace_checkout_policy]
type = "single_line_text_field"
name = "Marketplace checkout policy"
description = "Internal checkout routing policy managed by vendor-register."
access.admin = "merchant_read"
access.storefront = "none"

[auth]
redirect_urls = [ "https://vendor-register-pbjl.onrender.com/auth/callback" ]

[app_proxy]
url = "https://vendor-register-pbjl.onrender.com/apps/vendors"
subpath = "vendors"
prefix = "apps"
