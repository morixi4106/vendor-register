# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "f177c5247c86efe96612a2e44549819d"
name = "vendor-register"
application_url = "https://vendor-register-pbjl.onrender.com"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

[access_scopes]
scopes = "write_customers,read_customers,write_app_proxy"

[auth]
redirect_urls = [ "https://vendor-register-pbjl.onrender.com/api/auth" ]

[app_proxy]
url = "https://vendor-register-pbjl.onrender.com/api.vendor-register"
subpath = "vendor-register"
prefix = "apps"