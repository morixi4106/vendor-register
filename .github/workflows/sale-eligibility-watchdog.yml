name: Independent sale eligibility watchdog

on:
  schedule:
    - cron: "1-56/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: independent-sale-eligibility-watchdog
  cancel-in-progress: false

jobs:
  watchdog:
    if: ${{ vars.SALE_ELIGIBILITY_WATCHDOG_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Use Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Enforce purchase fail-safe
        env:
          LAUNCH_MONITOR_URL: ${{ vars.LAUNCH_MONITOR_URL }}
          SALE_ELIGIBILITY_WATCHDOG_TOKEN: ${{ secrets.SALE_ELIGIBILITY_WATCHDOG_TOKEN }}
          SHOPIFY_WATCHDOG_SHOP_DOMAIN: ${{ vars.SHOPIFY_WATCHDOG_SHOP_DOMAIN }}
          SHOPIFY_WATCHDOG_CLIENT_ID: ${{ secrets.SHOPIFY_WATCHDOG_CLIENT_ID }}
          SHOPIFY_WATCHDOG_CLIENT_SECRET: ${{ secrets.SHOPIFY_WATCHDOG_CLIENT_SECRET }}
        run: node scripts/sale-eligibility-watchdog-agent.mjs
