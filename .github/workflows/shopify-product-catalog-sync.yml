name: Shopify product catalog sync

on:
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: shopify-product-catalog-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Use Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Reconcile Shopify product catalog
        env:
          APP_URL: ${{ vars.LAUNCH_MONITOR_URL }}
          SHOPIFY_PRODUCT_CATALOG_SYNC_TOKEN: ${{ secrets.SHOPIFY_PRODUCT_CATALOG_SYNC_TOKEN }}
        run: node scripts/shopify-product-catalog-sync-agent.mjs
