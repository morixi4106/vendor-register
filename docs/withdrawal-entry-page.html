<style>
  .main-page-title,
  .page-title,
  .title--primary,
  main h1:first-of-type {
    display: none !important;
  }

  .vendor-withdrawal-embed {
    width: 100%;
    max-width: 980px;
    margin: 0 auto 56px;
    padding: 0 20px;
    box-sizing: border-box;
  }

  .vendor-withdrawal-frame {
    width: 100%;
    height: 980px;
    border: 0;
    display: block;
    overflow: hidden;
  }

  .vendor-withdrawal-fallback {
    margin-top: 16px;
    color: #4b5563;
    line-height: 1.7;
  }

  .vendor-withdrawal-fallback a {
    color: inherit;
    font-weight: 700;
  }
</style>

<section class="vendor-withdrawal-embed">
  <iframe
    id="vendor-withdrawal-frame"
    class="vendor-withdrawal-frame"
    src="/apps/vendors/withdrawal?embedded=1"
    title="撤回申請フォーム"
    loading="lazy"
    scrolling="no"
  ></iframe>
  <noscript>
    <p class="vendor-withdrawal-fallback">
      フォームが表示されない場合は
      <a href="/apps/vendors/withdrawal">撤回申請フォームを開く</a>
      から申請してください。
    </p>
  </noscript>
</section>

<script>
  (function () {
    var frame = document.getElementById("vendor-withdrawal-frame");
    if (!frame) return;

    var minFrameHeight = 900;

    function setFrameHeight(height) {
      var nextHeight = Number(height);
      if (!Number.isFinite(nextHeight) || nextHeight <= 0) return;
      frame.style.height = Math.ceil(Math.max(nextHeight, minFrameHeight)) + "px";
    }

    function measureFrameHeight() {
      try {
        var doc = frame.contentDocument || frame.contentWindow.document;
        if (!doc) return;

        setFrameHeight(
          Math.max(
            doc.documentElement ? doc.documentElement.scrollHeight : 0,
            doc.body ? doc.body.scrollHeight : 0
          )
        );
      } catch (error) {
        // The app proxy normally shares this origin. If a theme/browser blocks
        // direct measurement, the iframe still keeps a usable fallback height.
      }
    }

    function scrollFrameIntoView() {
      var rect = frame.getBoundingClientRect();
      var targetTop = window.pageYOffset + rect.top - 24;

      window.scrollTo({
        top: Math.max(targetTop, 0),
        behavior: "smooth",
      });
    }

    window.addEventListener("message", function (event) {
      if (event.source !== frame.contentWindow) return;
      if (!event.data) return;

      if (event.data.type === "vendorWithdrawalFrameHeight") {
        setFrameHeight(event.data.height);
      }

      if (event.data.type === "vendorWithdrawalScrollIntoView") {
        scrollFrameIntoView();
      }
    });

    frame.addEventListener("load", function () {
      measureFrameHeight();
      window.setTimeout(measureFrameHeight, 150);
      window.setTimeout(measureFrameHeight, 600);
    });

    var sourceParams = new URLSearchParams(window.location.search);
    if (!sourceParams.toString()) {
      window.setTimeout(measureFrameHeight, 300);
      window.setTimeout(measureFrameHeight, 1000);
      return;
    }

    var frameUrl = new URL("/apps/vendors/withdrawal", window.location.origin);
    frameUrl.searchParams.set("embedded", "1");

    ["orderNumber", "order", "customerEmail", "email"].forEach(function (key) {
      var value = sourceParams.get(key);
      if (value) frameUrl.searchParams.set(key, value);
    });

    frame.src = frameUrl.pathname + frameUrl.search;
  })();
</script>
